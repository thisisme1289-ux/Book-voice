<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BookVoice — PDF Reader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0e0d0b;
    --surface: #161512;
    --panel: #1c1a17;
    --border: #2e2c27;
    --accent: #c9a84c;
    --accent2: #e8c96a;
    --text: #e8e4d9;
    --muted: #7a7568;
    --highlight-bg: #c9a84c22;
    --highlight-border: #c9a84c;
    --active-para: #c9a84c18;
    --radius: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* Layout */
  #app { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 56px 1fr 140px; height: 100vh; }

  /* Header */
  #header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
  }
  #header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--accent);
    letter-spacing: 0.02em;
    flex: 1;
  }
  #header h1 span { color: var(--muted); font-weight: 400; font-style: italic; font-size: 0.95rem; }
  .hdr-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    transition: all 0.15s;
  }
  .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
  #file-input { display: none; }

  /* Sidebar */
  #sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  #sidebar-title {
    padding: 16px;
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
  }
  #chapters-list { flex: 1; padding: 8px 0; }
  .chapter-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 0.83rem;
    color: var(--muted);
    border-left: 2px solid transparent;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .chapter-item:hover { color: var(--text); background: var(--panel); }
  .chapter-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--active-para); }
  .chapter-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    display: block;
    margin-bottom: 2px;
  }

  #empty-sidebar {
    padding: 24px 16px;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.6;
  }

  /* Reading area */
  #reader {
    overflow-y: auto;
    padding: 48px 64px;
    background: var(--bg);
    position: relative;
  }

  /* Drop zone */
  #drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
  }
  #drop-zone.hidden { display: none; }
  .drop-icon {
    width: 72px;
    height: 72px;
    border: 2px dashed var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    color: var(--muted);
    transition: all 0.2s;
  }
  #drop-zone:hover .drop-icon { border-color: var(--accent); color: var(--accent); }
  .drop-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--text);
  }
  .drop-sub { font-size: 0.85rem; color: var(--muted); }
  .drop-btn {
    background: var(--accent);
    color: #0e0d0b;
    border: none;
    padding: 10px 24px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.88rem;
    margin-top: 8px;
    transition: background 0.15s;
  }
  .drop-btn:hover { background: var(--accent2); }

  /* Loading */
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #loading.hidden { display: none; }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { font-size: 0.85rem; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* Book content */
  #book-content { display: none; }
  #book-content.visible { display: block; }
  #chapter-heading {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.2;
  }
  #chapter-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 40px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .para {
    font-size: 1.05rem;
    line-height: 1.85;
    color: #ccc8bc;
    margin-bottom: 1.4em;
    padding: 8px 12px;
    border-left: 2px solid transparent;
    border-radius: 2px;
    transition: background 0.2s, border-color 0.2s;
    cursor: pointer;
  }
  .para:hover { background: var(--panel); }
  .para.reading {
    background: var(--active-para);
    border-left-color: var(--accent);
    color: var(--text);
  }
  .para.done { color: var(--muted); }

  /* Player bar */
  #player {
    grid-column: 1 / -1;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 32px;
    gap: 24px;
  }

  /* Progress info */
  #progress-info { display: flex; flex-direction: column; gap: 4px; }
  #now-reading {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.88rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
  }
  #progress-detail {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }
  #progress-bar-wrap { width: 100%; height: 2px; background: var(--border); border-radius: 2px; margin-top: 4px; }
  #progress-bar { height: 2px; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.3s; }

  /* Controls */
  #controls { display: flex; align-items: center; gap: 12px; }
  .ctrl-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  #play-btn {
    width: 52px; height: 52px;
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0d0b;
    font-size: 1.2rem;
  }
  #play-btn:hover { background: var(--accent2); border-color: var(--accent2); color: #0e0d0b; }

  /* Settings */
  #settings { display: flex; align-items: center; gap: 20px; justify-content: flex-end; }
  .setting-row { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .setting-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .setting-row input[type=range] {
    -webkit-appearance: none;
    width: 90px; height: 2px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  .setting-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .setting-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    min-width: 28px;
    text-align: right;
  }
  .range-row { display: flex; align-items: center; gap: 6px; }

  #voice-select {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    max-width: 140px;
    cursor: pointer;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* drag over state */
  body.dragging #drop-zone .drop-icon { border-color: var(--accent); color: var(--accent); transform: scale(1.1); }
</style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <header id="header">
    <h1>BookVoice <span id="book-title-hdr">— drop a PDF to begin</span></h1>
    <button class="hdr-btn" onclick="document.getElementById('file-input').click()">📂 Open PDF</button>
    <input type="file" id="file-input" accept=".pdf"/>
  </header>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-title">Chapters</div>
    <div id="chapters-list">
      <div id="empty-sidebar">Upload a PDF to see chapters detected from headings.</div>
    </div>
  </aside>

  <!-- Reader -->
  <main id="reader">
    <!-- Drop zone -->
    <div id="drop-zone">
      <div class="drop-icon">📖</div>
      <div class="drop-title">Drop your PDF here</div>
      <div class="drop-sub">Or click to browse — all processing happens in your browser</div>
      <button class="drop-btn" onclick="document.getElementById('file-input').click()">Choose PDF</button>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <div id="loading-text">Reading PDF...</div>
    </div>

    <!-- Book content -->
    <div id="book-content">
      <div id="chapter-heading"></div>
      <div id="chapter-meta"></div>
      <div id="paragraphs"></div>
    </div>
  </main>

  <!-- Player -->
  <footer id="player">
    <!-- Progress -->
    <div id="progress-info">
      <div id="now-reading">Not playing</div>
      <div id="progress-detail">—</div>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    </div>

    <!-- Controls -->
    <div id="controls">
      <button class="ctrl-btn" id="prev-btn" title="Previous paragraph">⏮</button>
      <button class="ctrl-btn" id="chapter-prev-btn" title="Previous chapter">↑</button>
      <button class="ctrl-btn" id="play-btn" title="Play / Pause">▶</button>
      <button class="ctrl-btn" id="chapter-next-btn" title="Next chapter">↓</button>
      <button class="ctrl-btn" id="next-btn" title="Next paragraph">⏭</button>
    </div>

    <!-- Settings -->
    <div id="settings">
      <div class="setting-row">
        <div class="setting-label">Voice</div>
        <select id="voice-select"><option>Loading voices…</option></select>
      </div>
      <div class="setting-row">
        <div class="setting-label">Speed</div>
        <div class="range-row">
          <input type="range" id="speed-slider" min="0.5" max="2" step="0.1" value="1"/>
          <span class="setting-val" id="speed-val">1×</span>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">Pitch</div>
        <div class="range-row">
          <input type="range" id="pitch-slider" min="0.5" max="2" step="0.1" value="1"/>
          <span class="setting-val" id="pitch-val">1</span>
        </div>
      </div>
    </div>
  </footer>
</div>

<script>
// ─── PDF.js setup ───────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─── State ───────────────────────────────────────────────────────────────────
let chapters = [];         // [{title, paraStart, paraEnd, pageRange}]
let allParas = [];         // flat array of paragraph strings
let currentChapter = 0;
let currentPara = 0;       // index within allParas
let isPlaying = false;
let voices = [];
let utterance = null;
let bookName = '';

// ─── Chapter heading patterns ─────────────────────────────────────────────
const HEADING_RE = /^(chapter\s+[\divxlIVXL]+|part\s+[\divxlIVXL]+|\d+\.\s+[A-Z]|[A-Z][A-Z\s]{4,40}$)/i;

// ─── File input ──────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadPDF(e.target.files[0]);
});

// ─── Drag & drop ─────────────────────────────────────────────────────────────
const reader = document.getElementById('reader');
document.body.addEventListener('dragover', e => { e.preventDefault(); document.body.classList.add('dragging'); });
document.body.addEventListener('dragleave', () => document.body.classList.remove('dragging'));
document.body.addEventListener('drop', e => {
  e.preventDefault();
  document.body.classList.remove('dragging');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') loadPDF(f);
});

// ─── Load PDF ────────────────────────────────────────────────────────────────
async function loadPDF(file) {
  stopSpeech();
  bookName = file.name.replace(/\.pdf$/i, '');
  document.getElementById('book-title-hdr').textContent = '— ' + bookName;
  document.getElementById('drop-zone').classList.add('hidden');
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('book-content').classList.remove('visible');

  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const totalPages = pdf.numPages;

  let rawParas = [];
  for (let p = 1; p <= totalPages; p++) {
    document.getElementById('loading-text').textContent =
      `Reading page ${p} of ${totalPages}…`;
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();

    // Group items into lines by y-position
    let lines = [];
    let lineMap = {};
    for (const item of content.items) {
      const y = Math.round(item.transform[5]);
      if (!lineMap[y]) { lineMap[y] = ''; lines.push(y); }
      lineMap[y] += item.str;
    }
    lines.sort((a, b) => b - a);
    for (const y of lines) {
      const line = lineMap[y].trim();
      if (line.length > 0) rawParas.push({ text: line, page: p });
    }
  }

  // Merge lines into paragraphs and detect headings
  allParas = [];
  chapters = [];
  let buffer = '';
  let bufferPage = 0;

  function flush() {
    if (buffer.trim().length > 20) {
      allParas.push({ text: buffer.trim(), page: bufferPage });
    }
    buffer = '';
  }

  for (const { text, page } of rawParas) {
    const isHeading = isChapterHeading(text);
    if (isHeading) {
      flush();
      chapters.push({ title: text, paraStart: allParas.length, page });
      allParas.push({ text, page, isHeading: true });
    } else {
      // Short line → probably end of paragraph
      const endsWithPunct = /[.!?:"]$/.test(text);
      const startsUpper = /^[A-Z"']/.test(text);
      if (buffer && endsWithPunct && startsUpper && text.length < 80) {
        buffer += ' ' + text;
        flush();
        bufferPage = page;
      } else {
        if (buffer && startsUpper && text.length > 80) {
          flush();
          bufferPage = page;
        }
        buffer = buffer ? buffer + ' ' + text : text;
        if (!bufferPage) bufferPage = page;
      }
    }
  }
  flush();

  // Fill paraEnd for chapters
  for (let i = 0; i < chapters.length; i++) {
    chapters[i].paraEnd = (i + 1 < chapters.length) ? chapters[i + 1].paraStart : allParas.length;
  }

  // If no chapters detected, make one big chapter
  if (chapters.length === 0) {
    chapters = [{ title: bookName, paraStart: 0, paraEnd: allParas.length, page: 1 }];
  }

  document.getElementById('loading').classList.add('hidden');
  buildSidebar();
  loadChapter(0);

  // Restore position
  const saved = localStorage.getItem('bookvoice_' + bookName);
  if (saved) {
    const { ch, para } = JSON.parse(saved);
    loadChapter(ch);
    jumpToPara(para);
  }
}

function isChapterHeading(text) {
  if (text.length > 120) return false;
  if (/^chapter\s+[\d\w]+/i.test(text)) return true;
  if (/^part\s+[\d\w]+/i.test(text)) return true;
  if (/^(introduction|preface|foreword|prologue|epilogue|conclusion|appendix)/i.test(text)) return true;
  if (/^\d+\.\s+[A-Z]/.test(text) && text.length < 80) return true;
  if (text === text.toUpperCase() && text.length > 5 && text.length < 60 && /[A-Z]/.test(text)) return true;
  return false;
}

// ─── Sidebar ─────────────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('chapters-list');
  list.innerHTML = '';
  chapters.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'chapter-item';
    div.innerHTML = `<span class="chapter-num">Ch ${i + 1} · p.${ch.page}</span>${ch.title}`;
    div.onclick = () => { stopSpeech(); loadChapter(i); };
    list.appendChild(div);
  });
}

function setSidebarActive(i) {
  document.querySelectorAll('.chapter-item').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });
  const active = document.querySelectorAll('.chapter-item')[i];
  if (active) active.scrollIntoView({ block: 'nearest' });
}

// ─── Chapter loading ──────────────────────────────────────────────────────────
function loadChapter(i) {
  currentChapter = i;
  const ch = chapters[i];
  setSidebarActive(i);

  document.getElementById('chapter-heading').textContent = ch.title;
  document.getElementById('chapter-meta').textContent =
    `Chapter ${i + 1} of ${chapters.length}  ·  Page ${ch.page}  ·  ${ch.paraEnd - ch.paraStart} paragraphs`;

  const container = document.getElementById('paragraphs');
  container.innerHTML = '';
  for (let p = ch.paraStart; p < ch.paraEnd; p++) {
    const para = allParas[p];
    if (para.isHeading) continue;
    const div = document.createElement('div');
    div.className = 'para';
    div.dataset.idx = p;
    div.textContent = para.text;
    div.onclick = () => { jumpToPara(p); if (!isPlaying) startReading(); };
    container.appendChild(div);
  }

  document.getElementById('book-content').classList.add('visible');
  currentPara = ch.paraStart;
  updateProgress();
}

// ─── TTS ─────────────────────────────────────────────────────────────────────
function speakPara(idx) {
  if (idx >= allParas.length) { stopSpeech(); return; }

  // Skip headings
  if (allParas[idx].isHeading) { currentPara = idx + 1; speakPara(idx + 1); return; }

  // Update chapter if needed
  const ch = chapters[currentChapter];
  if (idx >= ch.paraEnd && currentChapter < chapters.length - 1) {
    currentChapter++;
    loadChapter(currentChapter);
    currentPara = chapters[currentChapter].paraStart;
    speakPara(currentPara);
    return;
  }

  highlightPara(idx);
  scrollToPara(idx);
  updateProgress();
  savePosition();

  const text = allParas[idx].text;
  utterance = new SpeechSynthesisUtterance(text);
  utterance.voice = getSelectedVoice();
  utterance.rate = parseFloat(document.getElementById('speed-slider').value);
  utterance.pitch = parseFloat(document.getElementById('pitch-slider').value);

  utterance.onend = () => {
    markDone(idx);
    currentPara = idx + 1;
    if (isPlaying) speakPara(currentPara);
  };
  utterance.onerror = () => {
    currentPara = idx + 1;
    if (isPlaying) speakPara(currentPara);
  };

  speechSynthesis.speak(utterance);
}

function startReading() {
  isPlaying = true;
  document.getElementById('play-btn').textContent = '⏸';
  speakPara(currentPara);
}

function pauseReading() {
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶';
  speechSynthesis.cancel();
}

function stopSpeech() {
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶';
  speechSynthesis.cancel();
}

function togglePlay() {
  if (!allParas.length) return;
  if (isPlaying) pauseReading();
  else startReading();
}

document.getElementById('play-btn').onclick = togglePlay;

document.getElementById('next-btn').onclick = () => {
  const wasPLaying = isPlaying;
  stopSpeech();
  currentPara = Math.min(currentPara + 1, allParas.length - 1);
  // Skip headings
  while (currentPara < allParas.length - 1 && allParas[currentPara].isHeading) currentPara++;
  highlightPara(currentPara);
  scrollToPara(currentPara);
  updateProgress();
  if (wasPLaying) startReading();
};

document.getElementById('prev-btn').onclick = () => {
  const wasPlaying = isPlaying;
  stopSpeech();
  currentPara = Math.max(currentPara - 1, 0);
  while (currentPara > 0 && allParas[currentPara].isHeading) currentPara--;
  highlightPara(currentPara);
  scrollToPara(currentPara);
  updateProgress();
  if (wasPlaying) startReading();
};

document.getElementById('chapter-next-btn').onclick = () => {
  if (currentChapter < chapters.length - 1) {
    stopSpeech();
    loadChapter(currentChapter + 1);
  }
};

document.getElementById('chapter-prev-btn').onclick = () => {
  if (currentChapter > 0) {
    stopSpeech();
    loadChapter(currentChapter - 1);
  }
};

// ─── Para highlight / scroll ──────────────────────────────────────────────────
function highlightPara(idx) {
  document.querySelectorAll('.para').forEach(el => el.classList.remove('reading'));
  const el = document.querySelector(`.para[data-idx="${idx}"]`);
  if (el) el.classList.add('reading');
}

function markDone(idx) {
  const el = document.querySelector(`.para[data-idx="${idx}"]`);
  if (el) { el.classList.remove('reading'); el.classList.add('done'); }
}

function scrollToPara(idx) {
  const el = document.querySelector(`.para[data-idx="${idx}"]`);
  if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

function jumpToPara(idx) {
  stopSpeech();
  currentPara = idx;
  highlightPara(idx);
  scrollToPara(idx);
  updateProgress();
}

// ─── Progress ─────────────────────────────────────────────────────────────────
function updateProgress() {
  const ch = chapters[currentChapter];
  if (!ch) return;
  const paraInChapter = currentPara - ch.paraStart + 1;
  const chTotal = ch.paraEnd - ch.paraStart;
  document.getElementById('now-reading').textContent = ch.title;
  document.getElementById('progress-detail').textContent =
    `Chapter ${currentChapter + 1}/${chapters.length}  ·  Para ${paraInChapter}/${chTotal}  ·  p.${allParas[currentPara]?.page || '?'}`;
  const pct = allParas.length ? (currentPara / allParas.length) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ─── Position save ────────────────────────────────────────────────────────────
function savePosition() {
  if (!bookName) return;
  localStorage.setItem('bookvoice_' + bookName, JSON.stringify({ ch: currentChapter, para: currentPara }));
}

// ─── Voices ───────────────────────────────────────────────────────────────────
function loadVoices() {
  voices = speechSynthesis.getVoices();
  const sel = document.getElementById('voice-select');
  sel.innerHTML = '';
  // Prefer English voices first
  const sorted = [...voices].sort((a, b) => {
    const aEn = a.lang.startsWith('en') ? 0 : 1;
    const bEn = b.lang.startsWith('en') ? 0 : 1;
    return aEn - bEn;
  });
  sorted.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang})`;
    sel.appendChild(opt);
  });
}

function getSelectedVoice() {
  const sel = document.getElementById('voice-select');
  const idx = parseInt(sel.value);
  const sorted = [...voices].sort((a, b) => (a.lang.startsWith('en') ? 0 : 1) - (b.lang.startsWith('en') ? 0 : 1));
  return sorted[idx] || null;
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// ─── Sliders ──────────────────────────────────────────────────────────────────
document.getElementById('speed-slider').oninput = function() {
  document.getElementById('speed-val').textContent = parseFloat(this.value).toFixed(1) + '×';
};
document.getElementById('pitch-slider').oninput = function() {
  document.getElementById('pitch-val').textContent = parseFloat(this.value).toFixed(1);
};

// ─── Keyboard shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') document.getElementById('next-btn').click();
  if (e.code === 'ArrowLeft') document.getElementById('prev-btn').click();
  if (e.code === 'ArrowUp') document.getElementById('chapter-prev-btn').click();
  if (e.code === 'ArrowDown') document.getElementById('chapter-next-btn').click();
});
</script>
</body>
