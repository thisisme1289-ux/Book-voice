<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BookVoice</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #0f0e0c;
  --surface: #181613;
  --panel:   #201e1a;
  --border:  #302d27;
  --accent:  #c9a84c;
  --acc2:    #e8c96a;
  --text:    #e8e4d9;
  --muted:   #7a7568;
  --active:  rgba(201,168,76,0.10);
  --r: 6px;

  --HDR: 50px;
  --SB:  260px;
  --PL:  120px;   /* player height – generous on desktop */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; }

/* ───── SHELL ───── */
#shell {
  display: grid;
  grid-template-areas:
    "hdr hdr"
    "sb  rd"
    "pl  pl";
  grid-template-rows:    var(--HDR) 1fr var(--PL);
  grid-template-columns: var(--SB) 1fr;
  height: 100vh; height: 100dvh;
}

/* ───── HEADER ───── */
#hdr {
  grid-area: hdr;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px; min-width: 0;
}
#logo { font-family:'Playfair Display',serif; font-size:1.15rem; color:var(--accent); flex-shrink:0; }
#book-title { flex:1; font-size:.75rem; color:var(--muted); font-style:italic; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
#sb-toggle { display:none; background:none; border:none; color:var(--muted); font-size:1.3rem; cursor:pointer; padding:2px 6px; flex-shrink:0; }
.hbtn { flex-shrink:0; background:var(--panel); border:1px solid var(--border); color:var(--text); padding:5px 13px; border-radius:var(--r); cursor:pointer; font-family:inherit; font-size:.77rem; transition:all .15s; }
.hbtn:hover { border-color:var(--accent); color:var(--accent); }
#file-input { display:none; }

/* ───── SIDEBAR ───── */
#sb {
  grid-area: sb;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: transform .22s ease;
}
#sb-head { padding:11px 14px; font-size:.62rem; font-family:'DM Mono',monospace; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; border-bottom:1px solid var(--border); flex-shrink:0; }
#ch-list { flex:1; overflow-y:auto; padding:4px 0; }
.chi { padding:9px 14px; cursor:pointer; font-size:.78rem; color:var(--muted); border-left:2px solid transparent; transition:all .15s; line-height:1.35; }
.chi:hover  { color:var(--text);   background:var(--panel); }
.chi.active { color:var(--accent); border-left-color:var(--accent); background:var(--active); }
.chin { display:block; font-family:'DM Mono',monospace; font-size:.6rem; color:var(--muted); margin-bottom:2px; }
#ch-empty { padding:20px 14px; font-size:.78rem; color:var(--muted); line-height:1.6; }

/* ───── READER ───── */
#rd { grid-area:rd; overflow-y:auto; background:var(--bg); position:relative; }
#rd-inner { max-width:700px; margin:0 auto; padding:36px 28px 48px; }

#drop-zone {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
  text-align:center; padding:24px; cursor:default;
}
#drop-zone.hidden { display:none; }
.dring { width:76px;height:76px; border:2px dashed var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.9rem; transition:border-color .2s; }
body.drag .dring, #drop-zone:hover .dring { border-color:var(--accent); }
.dh { font-family:'Playfair Display',serif; font-size:1.35rem; color:var(--text); }
.ds { font-size:.8rem; color:var(--muted); max-width:300px; line-height:1.5; }
.dbtn { background:var(--accent); color:#0f0e0c; border:none; padding:9px 22px; border-radius:var(--r); cursor:pointer; font-family:inherit; font-weight:500; font-size:.83rem; }
.dbtn:hover { background:var(--acc2); }

#loading { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:11px; }
#loading.hidden { display:none; }
.spin { width:30px;height:30px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
#ld-txt { font-size:.78rem; color:var(--muted); font-family:'DM Mono',monospace; }
#ld-pct { font-size:1.1rem; color:var(--accent); font-family:'DM Mono',monospace; font-weight:500; }

#book-cnt { display:none; }
#book-cnt.vis { display:block; }
#ch-title { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; line-height:1.2; margin-bottom:6px; }
#ch-meta  { font-family:'DM Mono',monospace; font-size:.62rem; color:var(--muted); margin-bottom:28px; letter-spacing:.06em; text-transform:uppercase; }
.para {
  font-size:.97rem; line-height:1.85; color:#c4c0b4;
  margin-bottom:1.2em; padding:6px 10px;
  border-left:2px solid transparent; border-radius:3px;
  transition:all .2s; cursor:pointer;
}
.para:hover   { background:var(--panel); }
.para.reading { background:var(--active); border-left-color:var(--accent); color:var(--text); }
.para.done    { color:var(--muted); }

/* ───── PLAYER ─────
   Two-row layout inside the footer:
   Row 1: progress bar (full width)
   Row 2: [info] | [controls] | [settings]
*/
#pl {
  grid-area: pl;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
}

/* full-width thin progress strip */
#pl-bar-row {
  height: 3px;
  background: var(--border);
  flex-shrink: 0;
  position: relative;
}
#pl-bar { position:absolute; top:0; left:0; height:100%; background:var(--accent); width:0%; transition:width .3s; }

/* main row */
#pl-main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  min-width: 0;
}

/* LEFT — track info */
#pl-info { min-width:0; display:flex; flex-direction:column; gap:2px; }
#pl-now  { font-family:'Playfair Display',serif; font-style:italic; font-size:.83rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#pl-det  { font-family:'DM Mono',monospace; font-size:.6rem; color:var(--muted); }
#pl-stat { font-family:'DM Mono',monospace; font-size:.58rem; color:var(--accent); height:9px; margin-top:1px; }

/* CENTRE — controls */
#pl-ctrl { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.cbtn {
  background:none; border:1px solid var(--border); color:var(--muted);
  width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:.82rem;
  display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0;
}
.cbtn:hover { border-color:var(--accent); color:var(--accent); }
#play-btn { width:48px; height:48px; background:var(--accent); border-color:var(--accent); color:#0f0e0c; font-size:1.05rem; }
#play-btn:hover { background:var(--acc2); border-color:var(--acc2); }

/* RIGHT — voice + speed */
#pl-settings {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 18px;
  min-width: 0;
}
.sgrp { display:flex; flex-direction:column; gap:4px; align-items:flex-start; }
.slbl { font-family:'DM Mono',monospace; font-size:.58rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }

#voice-sel {
  background:var(--panel); border:1px solid var(--border); color:var(--text);
  padding:4px 8px; border-radius:var(--r); font-family:inherit; font-size:.75rem;
  cursor:pointer; width:155px;
}
#voice-sel:focus { outline:none; border-color:var(--accent); }

.speed-row { display:flex; align-items:center; gap:7px; }
#speed-sl {
  -webkit-appearance:none; width:100px; height:3px;
  background:var(--border); border-radius:2px; outline:none; cursor:pointer;
}
#speed-sl::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--accent); cursor:pointer; }
#speed-val { font-family:'DM Mono',monospace; font-size:.72rem; color:var(--accent); min-width:30px; }

/* ───── RESPONSIVE ───── */
@media (max-width:900px) {
  :root { --SB:0px; }
  #shell { grid-template-columns:0 1fr; }
  #sb-toggle { display:block; }
  #sb {
    position:fixed; top:var(--HDR); left:0; bottom:var(--PL);
    width:260px; z-index:100;
    transform:translateX(-100%);
    box-shadow:4px 0 24px rgba(0,0,0,.55);
  }
  #sb.open { transform:translateX(0); }
  #overlay { display:none; position:fixed; inset:0; z-index:99; background:rgba(0,0,0,.45); }
  #overlay.vis { display:block; }
}

/* Tablet player: stack settings below controls */
@media (max-width:720px) {
  :root { --PL:140px; }
  #pl-main { grid-template-columns:1fr; grid-template-rows:1fr auto; padding:6px 14px 10px; gap:8px; }
  #pl-ctrl { order:1; justify-content:center; }
  #pl-settings {
    order:2; justify-content:center;
    flex-direction:row; flex-wrap:nowrap; gap:18px;
    width:100%;
  }
  #pl-info { display:none; }   /* hide text info on tablet, keep bar visible */
}

/* Mobile */
@media (max-width:520px) {
  :root { --PL:150px; }
  #pl-settings { gap:14px; }
  #voice-sel { width:130px; font-size:.7rem; }
  #speed-sl  { width:80px; }
  #rd-inner  { padding:20px 14px; }
  #ch-title  { font-size:1.3rem; }
  .para { font-size:.9rem; line-height:1.75; }
}

/* Very small */
@media (max-width:400px) {
  .cbtn { width:30px; height:30px; font-size:.7rem; }
  #play-btn { width:42px; height:42px; }
  #voice-sel { width:110px; font-size:.66rem; }
}

/* scrollbar */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<div id="shell">

  <!-- HEADER -->
  <header id="hdr">
    <button id="sb-toggle">☰</button>
    <div id="logo">BookVoice</div>
    <div id="book-title">Open a PDF to begin</div>
    <button class="hbtn" onclick="document.getElementById('file-input').click()">📂 Open PDF</button>
    <input type="file" id="file-input" accept=".pdf"/>
  </header>

  <!-- SIDEBAR -->
  <aside id="sb">
    <div id="sb-head">Chapters</div>
    <div id="ch-list"><div id="ch-empty">Upload a PDF to see chapters here.</div></div>
  </aside>
  <div id="overlay"></div>

  <!-- READER -->
  <main id="rd">
    <div id="drop-zone">
      <div class="dring">📖</div>
      <div class="dh">Drop your PDF here</div>
      <div class="ds">Everything runs in your browser — your file never leaves your device</div>
      <button class="dbtn" onclick="document.getElementById('file-input').click()">Choose PDF</button>
    </div>
    <div id="loading" class="hidden">
      <div class="spin"></div>
      <div id="ld-txt">Reading PDF…</div>
      <div id="ld-pct"></div>
    </div>
    <div id="rd-inner">
      <div id="book-cnt">
        <div id="ch-title"></div>
        <div id="ch-meta"></div>
        <div id="paragraphs"></div>
      </div>
    </div>
  </main>

  <!-- PLAYER -->
  <footer id="pl">
    <div id="pl-bar-row"><div id="pl-bar"></div></div>
    <div id="pl-main">

      <!-- LEFT: info -->
      <div id="pl-info">
        <div id="pl-now">Not playing</div>
        <div id="pl-det">—</div>
        <div id="pl-stat"></div>
      </div>

      <!-- CENTRE: controls -->
      <div id="pl-ctrl">
        <button class="cbtn" id="ch-prev" title="Previous chapter">⏫</button>
        <button class="cbtn" id="p-prev"  title="Previous paragraph">⏮</button>
        <button class="cbtn" id="play-btn">▶</button>
        <button class="cbtn" id="p-next"  title="Next paragraph">⏭</button>
        <button class="cbtn" id="ch-next" title="Next chapter">⏬</button>
      </div>

      <!-- RIGHT: voice + speed -->
      <div id="pl-settings">
        <div class="sgrp">
          <span class="slbl">Voice</span>
          <select id="voice-sel">
            <option value="">Loading voices…</option>
          </select>
        </div>
        <div class="sgrp">
          <span class="slbl">Speed</span>
          <div class="speed-row">
            <input type="range" id="speed-sl" min="0.5" max="2" step="0.1" value="1"/>
            <span id="speed-val">1×</span>
          </div>
        </div>
      </div>

    </div>
  </footer>
</div>

<script>
// ── PDF.js ────────────────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ─────────────────────────────────────────────────────────────────────
let chapters = [], allParas = [];
let curCh = 0, curPara = 0;
let isPlaying = false, bookName = '';

// TTS
let synth      = window.speechSynthesis;
let voices     = [];
let curUtter   = null;
let keepAlive  = null;   // Chrome bug: synth stops after ~15s — we ping it

// ── Sidebar ───────────────────────────────────────────────────────────────────
const sbEl  = document.getElementById('sb');
const ovEl  = document.getElementById('overlay');
document.getElementById('sb-toggle').onclick = () => { sbEl.classList.toggle('open'); ovEl.classList.toggle('vis'); };
ovEl.onclick = closeSB;
function closeSB() { sbEl.classList.remove('open'); ovEl.classList.remove('vis'); }

// ── File / drag ───────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) loadPDF(e.target.files[0]); });
document.body.addEventListener('dragover',  e => { e.preventDefault(); document.body.classList.add('drag'); });
document.body.addEventListener('dragleave', ()  => document.body.classList.remove('drag'));
document.body.addEventListener('drop', e => {
  e.preventDefault(); document.body.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f?.type === 'application/pdf') loadPDF(f);
});

// ── PDF extraction ────────────────────────────────────────────────────────────
async function loadPDF(file) {
  stopSpeech();
  bookName = file.name.replace(/\.pdf$/i, '');
  document.getElementById('book-title').textContent = bookName;
  document.getElementById('drop-zone').classList.add('hidden');
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('book-cnt').classList.remove('vis');

  const pdf   = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  const total = pdf.numPages;
  const rawParas = [];

  for (let p = 1; p <= total; p++) {
    document.getElementById('ld-txt').textContent = `Extracting page ${p} of ${total}`;
    document.getElementById('ld-pct').textContent  = Math.round(p / total * 100) + '%';

    const page    = await pdf.getPage(p);
    const content = await page.getTextContent();

    // Collect all non-empty items
    const items = content.items
      .filter(it => it.str && it.str.trim())
      .map(it => ({ str: it.str, x: it.transform[4], y: it.transform[5], h: Math.abs(it.height)||10, w: Math.abs(it.width)||0 }));
    if (!items.length) continue;

    // Sort top→bottom, left→right
    items.sort((a, b) => b.y - a.y || a.x - b.x);

    // Group into lines with 4px y-tolerance
    const lines = [];
    for (const it of items) {
      const last = lines[lines.length - 1];
      if (last && Math.abs(it.y - last.refY) <= 4) {
        last.items.push(it); last.h = Math.max(last.h, it.h);
      } else {
        lines.push({ refY: it.y, items: [it], h: it.h });
      }
    }

    // Build line text — sort items by x within line
    for (const ln of lines) {
      ln.items.sort((a, b) => a.x - b.x);
      let t = '';
      for (let i = 0; i < ln.items.length; i++) {
        if (i > 0) t += (ln.items[i].x - (ln.items[i-1].x + ln.items[i-1].w) > 3 ? ' ' : '') + ln.items[i].str;
        else t = ln.items[i].str;
      }
      ln.text = t.replace(/\s+/g, ' ').trim();
    }

    // Median line height → paragraph gap threshold
    const hs   = lines.map(l => l.h).filter(h => h > 2).sort((a,b) => a-b);
    const medH = hs[Math.floor(hs.length / 2)] || 12;
    const GAP  = medH * 1.4;

    // Filter junk lines
    const valid = lines.filter(ln => ln.text.length > 1 && !/^\d{1,4}$/.test(ln.text.trim()));

    // Accumulate into paragraphs
    let buf = [];
    for (let i = 0; i < valid.length; i++) {
      buf.push(valid[i].text);
      const gap = valid[i+1] ? valid[i].refY - valid[i+1].refY : GAP + 1;
      if (gap > GAP || i === valid.length - 1) {
        const joined = buf.join(' ').replace(/\s+/g, ' ').trim();
        if (joined.length > 10) rawParas.push({ text: joined, page: p });
        buf = [];
      }
    }
  }

  // Build chapter structure
  allParas = []; chapters = [];
  for (const { text, page } of rawParas) {
    if (isHeading(text)) {
      chapters.push({ title: text, start: allParas.length, page });
      allParas.push({ text, page, heading: true });
    } else {
      allParas.push({ text, page });
    }
  }
  for (let i = 0; i < chapters.length; i++)
    chapters[i].end = (i + 1 < chapters.length) ? chapters[i+1].start : allParas.length;
  if (!chapters.length)
    chapters = [{ title: bookName, start: 0, end: allParas.length, page: 1 }];

  document.getElementById('loading').classList.add('hidden');
  buildSidebar();
  loadChapter(0);

  try {
    const s = localStorage.getItem('bv_' + bookName);
    if (s) { const { ch, para } = JSON.parse(s); loadChapter(ch); jumpTo(para); }
  } catch {}
}

function isHeading(text) {
  if (text.length > 100) return false;
  if (/^chapter\s+[\d\w]+/i.test(text))   return true;
  if (/^part\s+[\divxlIVXL]+/i.test(text)) return true;
  if (/^(introduction|preface|foreword|prologue|epilogue|conclusion|appendix|bibliography)/i.test(text)) return true;
  if (/^\d{1,2}\.\s+[A-Z]/.test(text) && text.length < 70) return true;
  const s = text.replace(/[^A-Za-z]/g,'');
  if (s.length > 3 && s === s.toUpperCase() && text.length < 55) return true;
  return false;
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('ch-list');
  list.innerHTML = '';
  chapters.forEach((ch, i) => {
    const d = document.createElement('div');
    d.className = 'chi';
    d.innerHTML = `<span class="chin">Ch ${i+1} · p.${ch.page}</span>${ch.title}`;
    d.onclick = () => { stopSpeech(); loadChapter(i); closeSB(); };
    list.appendChild(d);
  });
}
function activateSB(i) {
  document.querySelectorAll('.chi').forEach((el,idx) => el.classList.toggle('active', idx === i));
  document.querySelectorAll('.chi')[i]?.scrollIntoView({ block:'nearest' });
}

// ── Chapter ───────────────────────────────────────────────────────────────────
function loadChapter(i) {
  curCh = i;
  const ch = chapters[i];
  activateSB(i);
  document.getElementById('ch-title').textContent = ch.title;
  document.getElementById('ch-meta').textContent  =
    `Chapter ${i+1} of ${chapters.length}  ·  Page ${ch.page}  ·  ${ch.end - ch.start} paragraphs`;

  const box = document.getElementById('paragraphs');
  box.innerHTML = '';
  for (let p = ch.start; p < ch.end; p++) {
    if (allParas[p].heading) continue;
    const d = document.createElement('div');
    d.className = 'para'; d.dataset.idx = p; d.textContent = allParas[p].text;
    d.onclick = () => { jumpTo(p); if (!isPlaying) startReading(); };
    box.appendChild(d);
  }

  document.getElementById('book-cnt').classList.add('vis');
  document.getElementById('rd').scrollTop = 0;
  curPara = ch.start;
  updateProgress();
}

// ── TTS — Web Speech API (most reliable, works offline) ───────────────────────
// Chrome has a bug where long speech silently stops. Fix: pause/resume every 10s.
function loadVoices() {
  voices = synth.getVoices();
  if (!voices.length) return;

  const sel = document.getElementById('voice-sel');
  sel.innerHTML = '';

  // Priority: Google HD voices > Microsoft voices > other en > rest
  const ranked = [...voices].sort((a, b) => {
    const score = v => {
      if (!v.lang.startsWith('en')) return 0;
      if (v.name.includes('Google') && v.name.includes('English')) return 10;
      if (v.name.includes('Microsoft')) return 8;
      if (v.localService) return 5;
      return 3;
    };
    return score(b) - score(a);
  });

  ranked.forEach((v, i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = v.name + ' (' + v.lang + ')';
    sel.appendChild(o);
  });

  // Pick best English voice by default
  const best = ranked.findIndex(v => v.lang.startsWith('en') && v.name.includes('Google'));
  if (best >= 0) sel.value = best;
}

synth.onvoiceschanged = loadVoices;
loadVoices(); // call immediately in case already loaded

function getVoice() {
  const sel = document.getElementById('voice-sel');
  const ranked = [...voices].sort((a, b) => {
    const score = v => {
      if (!v.lang.startsWith('en')) return 0;
      if (v.name.includes('Google') && v.name.includes('English')) return 10;
      if (v.name.includes('Microsoft')) return 8;
      if (v.localService) return 5;
      return 3;
    };
    return score(b) - score(a);
  });
  return ranked[parseInt(sel.value)] || null;
}

// Split text into chunks safe for speechSynthesis (~220 chars at sentence breaks)
function splitChunks(text) {
  const sents = text.match(/[^.!?]+[.!?]+["'\u201d]?\s*/g) || [text];
  const out = []; let buf = '';
  for (const s of sents) {
    if ((buf + s).length > 220) { if (buf) out.push(buf.trim()); buf = s; }
    else buf += s;
  }
  if (buf.trim()) out.push(buf.trim());
  return out.length ? out : [text.substring(0, 220)];
}

function speakChunks(chunks, idx, onDone) {
  if (!isPlaying || idx >= chunks.length) { onDone(); return; }
  const u = new SpeechSynthesisUtterance(chunks[idx]);
  u.voice  = getVoice();
  u.rate   = parseFloat(document.getElementById('speed-sl').value) || 1;
  u.pitch  = 1;
  u.onend  = () => speakChunks(chunks, idx + 1, onDone);
  u.onerror = e => { if (e.error !== 'interrupted') speakChunks(chunks, idx + 1, onDone); };
  curUtter = u;
  synth.speak(u);
}

function speakPara(idx) {
  if (!isPlaying || idx >= allParas.length) { stopSpeech(); return; }
  if (allParas[idx].heading) { curPara = idx + 1; speakPara(idx + 1); return; }

  // Cross chapter boundary
  const ch = chapters[curCh];
  if (idx >= ch.end && curCh < chapters.length - 1) {
    curCh++; loadChapter(curCh);
    curPara = chapters[curCh].start;
    speakPara(curPara); return;
  }

  highlight(idx); scrollTo(idx); updateProgress(); savePos();

  const chunks = splitChunks(allParas[idx].text);
  speakChunks(chunks, 0, () => {
    if (isPlaying) { markDone(idx); curPara = idx + 1; speakPara(curPara); }
  });
}

// Chrome keep-alive: synth silently pauses after ~15s — resume it
function startKeepAlive() {
  stopKeepAlive();
  keepAlive = setInterval(() => {
    if (synth.speaking && !synth.paused) { synth.pause(); synth.resume(); }
  }, 10000);
}
function stopKeepAlive() { if (keepAlive) { clearInterval(keepAlive); keepAlive = null; } }

function startReading() {
  if (isPlaying || !allParas.length) return;
  isPlaying = true;
  document.getElementById('play-btn').textContent = '⏸';
  startKeepAlive();
  speakPara(curPara);
}

function pauseReading() {
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶';
  synth.cancel();
  stopKeepAlive();
  setStat('');
}

function stopSpeech() {
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶';
  synth.cancel();
  stopKeepAlive();
  setStat('');
}

function togglePlay() {
  if (!allParas.length) return;
  isPlaying ? pauseReading() : startReading();
}

function setStat(s) { document.getElementById('pl-stat').textContent = s; }

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('play-btn').onclick = togglePlay;

document.getElementById('p-next').onclick = () => {
  const was = isPlaying; stopSpeech();
  curPara = Math.min(curPara + 1, allParas.length - 1);
  while (curPara < allParas.length - 1 && allParas[curPara].heading) curPara++;
  highlight(curPara); scrollTo(curPara); updateProgress();
  if (was) startReading();
};
document.getElementById('p-prev').onclick = () => {
  const was = isPlaying; stopSpeech();
  curPara = Math.max(curPara - 1, 0);
  while (curPara > 0 && allParas[curPara].heading) curPara--;
  highlight(curPara); scrollTo(curPara); updateProgress();
  if (was) startReading();
};
document.getElementById('ch-next').onclick = () => { if (curCh < chapters.length-1) { stopSpeech(); loadChapter(curCh+1); } };
document.getElementById('ch-prev').onclick = () => { if (curCh > 0) { stopSpeech(); loadChapter(curCh-1); } };

document.getElementById('speed-sl').oninput = function() {
  document.getElementById('speed-val').textContent = parseFloat(this.value).toFixed(1).replace('.0','') + '×';
  // restart current para to apply speed
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function highlight(idx) {
  document.querySelectorAll('.para').forEach(e => e.classList.remove('reading'));
  document.querySelector(`.para[data-idx="${idx}"]`)?.classList.add('reading');
}
function markDone(idx) {
  const e = document.querySelector(`.para[data-idx="${idx}"]`);
  if (e) { e.classList.remove('reading'); e.classList.add('done'); }
}
function scrollTo(idx) {
  document.querySelector(`.para[data-idx="${idx}"]`)?.scrollIntoView({ block:'center', behavior:'smooth' });
}
function jumpTo(idx) { stopSpeech(); curPara = idx; highlight(idx); scrollTo(idx); updateProgress(); }

function updateProgress() {
  const ch = chapters[curCh]; if (!ch) return;
  document.getElementById('pl-now').textContent = ch.title;
  document.getElementById('pl-det').textContent =
    `Ch ${curCh+1}/${chapters.length}  ·  §${curPara-ch.start+1}/${ch.end-ch.start}  ·  p.${allParas[curPara]?.page||'?'}`;
  document.getElementById('pl-bar').style.width =
    (allParas.length ? curPara/allParas.length*100 : 0) + '%';
}

function savePos() {
  if (bookName) localStorage.setItem('bv_'+bookName, JSON.stringify({ ch:curCh, para:curPara }));
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.code==='Space')      { e.preventDefault(); togglePlay(); }
  if (e.code==='ArrowRight') document.getElementById('p-next').click();
  if (e.code==='ArrowLeft')  document.getElementById('p-prev').click();
  if (e.code==='ArrowUp')    document.getElementById('ch-prev').click();
  if (e.code==='ArrowDown')  document.getElementById('ch-next').click();
});
</script>
</body>
</html>
