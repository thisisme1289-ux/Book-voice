<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BookVoice</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:          #0e0d0b;
  --surface:     #161512;
  --panel:       #1c1a17;
  --border:      #2e2c27;
  --accent:      #c9a84c;
  --accent2:     #e8c96a;
  --text:        #e8e4d9;
  --muted:       #7a7568;
  --para-active: #c9a84c16;
  --r:           6px;
  --hdr-h:    52px;
  --player-h: 80px;
  --sidebar-w: 260px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

/* SHELL */
#shell {
  display: grid;
  grid-template-rows: var(--hdr-h) 1fr var(--player-h);
  grid-template-columns: var(--sidebar-w) 1fr;
  height: 100vh;
  height: 100dvh;
}

/* HEADER */
#hdr {
  grid-column: 1 / -1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  min-width: 0;
}
#hdr-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--accent); white-space: nowrap; flex-shrink: 0; }
#hdr-title { font-size: 0.78rem; color: var(--muted); font-style: italic; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.hbtn {
  flex-shrink: 0; background: var(--panel); border: 1px solid var(--border);
  color: var(--text); padding: 5px 12px; border-radius: var(--r);
  cursor: pointer; font-size: 0.78rem; font-family: inherit; white-space: nowrap;
  transition: border-color .15s, color .15s;
}
.hbtn:hover { border-color: var(--accent); color: var(--accent); }
#sidebar-toggle { display: none; background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 4px 8px; flex-shrink: 0; }
#file-input { display: none; }

/* SIDEBAR */
#sidebar {
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; transition: transform .25s ease;
}
#sidebar-hd {
  padding: 12px 14px; font-size: 0.65rem; font-family: 'DM Mono', monospace;
  color: var(--muted); letter-spacing: .12em; text-transform: uppercase;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#ch-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.ch-item { padding: 9px 14px; cursor: pointer; font-size: 0.8rem; color: var(--muted); border-left: 2px solid transparent; transition: all .15s; line-height: 1.35; }
.ch-item:hover  { color: var(--text); background: var(--panel); }
.ch-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--para-active); }
.ch-num { display: block; font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); margin-bottom: 2px; }
#ch-empty { padding: 20px 14px; font-size: 0.8rem; color: var(--muted); line-height: 1.6; }

/* READER */
#reader { overflow-y: auto; background: var(--bg); position: relative; }
#reader-inner { max-width: 720px; margin: 0 auto; padding: 40px 32px; }

/* Drop zone */
#drop-zone {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px; cursor: pointer;
  text-align: center; padding: 24px;
}
#drop-zone.hidden { display: none; }
.drop-ring {
  width: 80px; height: 80px; border: 2px dashed var(--border); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 2rem; transition: all .2s;
}
#drop-zone:hover .drop-ring, body.drag .drop-ring { border-color: var(--accent); }
.drop-h { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); }
.drop-s { font-size: 0.82rem; color: var(--muted); max-width: 320px; line-height: 1.5; }
.drop-btn {
  background: var(--accent); color: #0e0d0b; border: none; padding: 9px 22px;
  border-radius: var(--r); cursor: pointer; font-family: inherit; font-weight: 500; font-size: 0.85rem;
}
.drop-btn:hover { background: var(--accent2); }

/* Loading */
#loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
#loading.hidden { display: none; }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#load-txt { font-size: 0.8rem; color: var(--muted); font-family: 'DM Mono', monospace; }
#load-pct { font-size: 1rem; color: var(--accent); font-family: 'DM Mono', monospace; font-weight: 500; }

/* Book content */
#book-content { display: none; }
#book-content.vis { display: block; }
#ch-title { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
#ch-meta { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-bottom: 32px; letter-spacing: .06em; text-transform: uppercase; }
.para {
  font-size: 1rem; line-height: 1.85; color: #c8c4b8; margin-bottom: 1.3em;
  padding: 6px 10px; border-left: 2px solid transparent; border-radius: 3px;
  transition: background .2s, border-color .2s, color .2s; cursor: pointer;
}
.para:hover  { background: var(--panel); }
.para.reading { background: var(--para-active); border-left-color: var(--accent); color: var(--text); }
.para.done   { color: var(--muted); }

/* PLAYER */
#player {
  grid-column: 1 / -1; background: var(--surface); border-top: 1px solid var(--border);
  display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
  padding: 0 20px; gap: 16px; min-width: 0;
}
#prog-info { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
#now-reading { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.82rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#prog-detail { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); }
#prog-bar-wrap { width: 100%; height: 2px; background: var(--border); border-radius: 2px; margin-top: 4px; }
#prog-bar { height: 2px; background: var(--accent); border-radius: 2px; width: 0%; transition: width .3s; }
#tts-status { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--accent); height: 10px; margin-top: 2px; }

#controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.cbtn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0;
}
.cbtn:hover { border-color: var(--accent); color: var(--accent); }
#play-btn { width: 46px; height: 46px; background: var(--accent); border-color: var(--accent); color: #0e0d0b; font-size: 1rem; }
#play-btn:hover { background: var(--accent2); border-color: var(--accent2); }

#settings { display: flex; align-items: center; gap: 14px; justify-content: flex-end; min-width: 0; }
.srow { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.slabel { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.srow input[type=range] { -webkit-appearance: none; width: 80px; height: 2px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; }
.srow input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%; background: var(--accent); cursor: pointer; }
.sval { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--accent); min-width: 26px; text-align: right; }
.rrow { display: flex; align-items: center; gap: 5px; }
#voice-sel { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 3px 6px; border-radius: var(--r); font-family: inherit; font-size: 0.72rem; cursor: pointer; max-width: 130px; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* RESPONSIVE */
@media (max-width: 900px) {
  :root { --sidebar-w: 0px; }
  #shell { grid-template-columns: 0 1fr; }
  #sidebar-toggle { display: block; }
  #sidebar {
    position: fixed; top: var(--hdr-h); left: 0; bottom: var(--player-h);
    width: 260px; z-index: 100; transform: translateX(-100%);
    box-shadow: 4px 0 24px rgba(0,0,0,.5);
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 99; background: rgba(0,0,0,.4); }
  #sidebar-overlay.vis { display: block; }
}

@media (max-width: 640px) {
  :root { --player-h: 116px; }
  #player { grid-template-columns: 1fr; grid-template-rows: auto auto auto; padding: 8px 14px; gap: 6px; align-content: center; }
  #controls { justify-content: center; }
  #prog-info { width: 100%; }
  #settings { justify-content: center; flex-wrap: wrap; gap: 10px; }
  #reader-inner { padding: 20px 14px; }
  #ch-title { font-size: 1.3rem; }
  .para { font-size: 0.93rem; line-height: 1.75; }
  #now-reading { font-size: 0.78rem; }
}

@media (max-width: 400px) {
  :root { --player-h: 130px; }
  #hdr-logo { font-size: 0.95rem; }
  .cbtn { width: 32px; height: 32px; font-size: 0.75rem; }
  #play-btn { width: 42px; height: 42px; }
  #voice-sel { display: none; }
  .srow.hide-xs { display: none; }
}
</style>
</head>
<body>
<div id="shell">

  <header id="hdr">
    <button id="sidebar-toggle" title="Chapters">☰</button>
    <div id="hdr-logo">BookVoice</div>
    <div id="hdr-title">Drop a PDF to begin</div>
    <button class="hbtn" onclick="document.getElementById('file-input').click()">📂 Open PDF</button>
    <input type="file" id="file-input" accept=".pdf"/>
  </header>

  <aside id="sidebar">
    <div id="sidebar-hd">Chapters</div>
    <div id="ch-list"><div id="ch-empty">Upload a PDF to see chapters here.</div></div>
  </aside>
  <div id="sidebar-overlay"></div>

  <main id="reader">
    <div id="drop-zone">
      <div class="drop-ring">📖</div>
      <div class="drop-h">Drop your PDF here</div>
      <div class="drop-s">All processing happens in your browser — your book never leaves your device</div>
      <button class="drop-btn" onclick="document.getElementById('file-input').click()">Choose PDF</button>
    </div>
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <div id="load-txt">Reading PDF…</div>
      <div id="load-pct"></div>
    </div>
    <div id="reader-inner">
      <div id="book-content">
        <div id="ch-title"></div>
        <div id="ch-meta"></div>
        <div id="paragraphs"></div>
      </div>
    </div>
  </main>

  <footer id="player">
    <div id="prog-info">
      <div id="now-reading">Not playing</div>
      <div id="prog-detail">—</div>
      <div id="prog-bar-wrap"><div id="prog-bar"></div></div>
      <div id="tts-status"></div>
    </div>
    <div id="controls">
      <button class="cbtn" id="ch-prev-btn" title="Prev chapter">⏫</button>
      <button class="cbtn" id="prev-btn"    title="Prev paragraph">⏮</button>
      <button class="cbtn" id="play-btn"    title="Play / Pause">▶</button>
      <button class="cbtn" id="next-btn"    title="Next paragraph">⏭</button>
      <button class="cbtn" id="ch-next-btn" title="Next chapter">⏬</button>
    </div>
    <div id="settings">
      <div class="srow">
        <span class="slabel">Voice</span>
        <select id="voice-sel">
          <optgroup label="🇬🇧 British">
            <option value="Brian" selected>Brian ♂</option>
            <option value="Amy">Amy ♀</option>
            <option value="Emma">Emma ♀</option>
            <option value="Geraint">Geraint ♂</option>
          </optgroup>
          <optgroup label="🇺🇸 American">
            <option value="Matthew">Matthew ♂</option>
            <option value="Joanna">Joanna ♀</option>
            <option value="Joey">Joey ♂</option>
            <option value="Kendra">Kendra ♀</option>
            <option value="Salli">Salli ♀</option>
          </optgroup>
          <optgroup label="🇦🇺 Australian">
            <option value="Russell">Russell ♂</option>
            <option value="Nicole">Nicole ♀</option>
          </optgroup>
          <optgroup label="🇮🇳 Indian">
            <option value="Raveena">Raveena ♀</option>
            <option value="Aditi">Aditi ♀</option>
          </optgroup>
        </select>
      </div>
      <div class="srow">
        <span class="slabel">Speed</span>
        <div class="rrow">
          <input type="range" id="speed-sl" min="0.7" max="1.5" step="0.05" value="1"/>
          <span class="sval" id="speed-val">1×</span>
        </div>
      </div>
    </div>
  </footer>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// State
let chapters = [], allParas = [];
let curChapter = 0, curPara = 0;
let isPlaying = false, bookName = '';
let audioEl = null;
let sentIdx = 0, paraSentences = [], nextBlob = null;

// Sidebar toggle
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebar-overlay');
document.getElementById('sidebar-toggle').onclick = () => {
  sidebar.classList.toggle('open'); overlay.classList.toggle('vis');
};
overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.remove('vis'); };

// File / drag
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadPDF(e.target.files[0]);
});
['dragover','dragleave','drop'].forEach(ev => document.body.addEventListener(ev, e => {
  e.preventDefault();
  if (ev === 'dragover')  document.body.classList.add('drag');
  if (ev === 'dragleave') document.body.classList.remove('drag');
  if (ev === 'drop') {
    document.body.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f?.type === 'application/pdf') loadPDF(f);
  }
}));

// ── PDF EXTRACTION (fixed) ───────────────────────────────────────────────────
async function loadPDF(file) {
  stopSpeech();
  bookName = file.name.replace(/\.pdf$/i, '');
  document.getElementById('hdr-title').textContent = bookName;
  document.getElementById('drop-zone').classList.add('hidden');
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('book-content').classList.remove('vis');

  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const total = pdf.numPages;
  const rawParas = [];

  for (let p = 1; p <= total; p++) {
    document.getElementById('load-txt').textContent = `Extracting page ${p} of ${total}`;
    document.getElementById('load-pct').textContent = Math.round((p / total) * 100) + '%';

    const page    = await pdf.getPage(p);
    const content = await page.getTextContent();

    // Collect all non-empty text items with position info
    const items = content.items
      .filter(it => it.str && it.str.trim().length > 0)
      .map(it => ({
        str: it.str,
        x:   it.transform[4],
        y:   it.transform[5],
        h:   Math.abs(it.height) || 10,
        w:   Math.abs(it.width)  || 0,
      }));

    if (!items.length) continue;

    // Group items into visual lines using y-position tolerance
    // Items within 4px of each other vertically are on the same line
    const sorted = [...items].sort((a, b) => b.y - a.y || a.x - b.x);
    const lines = [];

    for (const it of sorted) {
      const last = lines[lines.length - 1];
      if (last && Math.abs(it.y - last.refY) <= 4) {
        last.items.push(it);
        last.h = Math.max(last.h, it.h);
      } else {
        lines.push({ refY: it.y, items: [it], h: it.h });
      }
    }

    // Within each line, sort left→right and join text
    for (const ln of lines) {
      ln.items.sort((a, b) => a.x - b.x);
      let text = '';
      for (let i = 0; i < ln.items.length; i++) {
        const it = ln.items[i];
        if (i > 0) {
          const prev = ln.items[i - 1];
          const gap  = it.x - (prev.x + prev.w);
          // Add space if items are clearly separated
          text += (gap > 3 ? ' ' : '') + it.str;
        } else {
          text += it.str;
        }
      }
      ln.text = text.replace(/\s+/g, ' ').trim();
    }

    // Compute median line height to calibrate paragraph gap detection
    const hs = lines.map(l => l.h).filter(h => h > 2).sort((a, b) => a - b);
    const medH = hs[Math.floor(hs.length / 2)] || 12;
    // A gap larger than 1.5× the normal line height indicates a new paragraph
    const PARA_GAP = medH * 1.5;

    // Filter obvious junk: page numbers, single chars
    const valid = lines.filter(ln => {
      if (!ln.text || ln.text.length < 2)         return false;
      if (/^\d{1,4}$/.test(ln.text.trim()))        return false; // bare page number
      if (/^[-–—]+$/.test(ln.text.trim()))          return false; // dividers
      return true;
    });

    // Build paragraphs: accumulate lines; flush when gap is large
    let buf = [];
    for (let i = 0; i < valid.length; i++) {
      buf.push(valid[i].text);
      const gap = valid[i + 1] ? valid[i].refY - valid[i + 1].refY : PARA_GAP + 1;
      if (gap > PARA_GAP || i === valid.length - 1) {
        const joined = buf.join(' ').replace(/\s+/g, ' ').trim();
        if (joined.length > 10) rawParas.push({ text: joined, page: p });
        buf = [];
      }
    }
  }

  // Build allParas + chapters
  allParas = []; chapters = [];
  for (const { text, page } of rawParas) {
    if (isHeading(text)) {
      chapters.push({ title: text, paraStart: allParas.length, page });
      allParas.push({ text, page, isHeading: true });
    } else {
      allParas.push({ text, page });
    }
  }

  for (let i = 0; i < chapters.length; i++) {
    chapters[i].paraEnd = i + 1 < chapters.length ? chapters[i + 1].paraStart : allParas.length;
  }
  if (chapters.length === 0) {
    chapters = [{ title: bookName, paraStart: 0, paraEnd: allParas.length, page: 1 }];
  }

  document.getElementById('loading').classList.add('hidden');
  buildSidebar();
  loadChapter(0);

  try {
    const s = localStorage.getItem('bv_' + bookName);
    if (s) { const { ch, para } = JSON.parse(s); loadChapter(ch); jumpTo(para); }
  } catch {}
}

function isHeading(text) {
  if (text.length > 100) return false;
  if (/^chapter\s+[\d\w]+/i.test(text))                         return true;
  if (/^part\s+[\divxlIVXL]+/i.test(text))                      return true;
  if (/^(introduction|preface|foreword|prologue|epilogue|conclusion|appendix|bibliography)/i.test(text)) return true;
  if (/^\d{1,2}\.\s+[A-Z]/.test(text) && text.length < 70)      return true;
  const stripped = text.replace(/[^A-Za-z]/g, '');
  if (stripped.length > 3 && stripped === stripped.toUpperCase() && text.length < 55) return true;
  return false;
}

// Sidebar
function buildSidebar() {
  const list = document.getElementById('ch-list');
  list.innerHTML = '';
  chapters.forEach((ch, i) => {
    const d = document.createElement('div');
    d.className = 'ch-item';
    d.innerHTML = `<span class="ch-num">Ch ${i + 1} · p.${ch.page}</span>${ch.title}`;
    d.onclick = () => {
      stopSpeech(); loadChapter(i);
      sidebar.classList.remove('open'); overlay.classList.remove('vis');
    };
    list.appendChild(d);
  });
}

function activateSidebar(i) {
  document.querySelectorAll('.ch-item').forEach((el, idx) => el.classList.toggle('active', idx === i));
  document.querySelectorAll('.ch-item')[i]?.scrollIntoView({ block: 'nearest' });
}

// Chapter display
function loadChapter(i) {
  curChapter = i;
  const ch = chapters[i];
  activateSidebar(i);
  document.getElementById('ch-title').textContent = ch.title;
  document.getElementById('ch-meta').textContent =
    `Chapter ${i + 1} of ${chapters.length}  ·  Page ${ch.page}  ·  ${ch.paraEnd - ch.paraStart} paragraphs`;

  const box = document.getElementById('paragraphs');
  box.innerHTML = '';
  for (let p = ch.paraStart; p < ch.paraEnd; p++) {
    if (allParas[p].isHeading) continue;
    const d = document.createElement('div');
    d.className = 'para'; d.dataset.idx = p;
    d.textContent = allParas[p].text;
    d.onclick = () => { jumpTo(p); if (!isPlaying) startReading(); };
    box.appendChild(d);
  }

  document.getElementById('book-content').classList.add('vis');
  document.getElementById('reader').scrollTop = 0;
  curPara = ch.paraStart;
  updateProgress();
}

// TTS — StreamElements
const SE      = 'https://api.streamelements.com/kappa/v2/speech';
const MAX_CH  = 190;

function getVoice() { return document.getElementById('voice-sel').value || 'Brian'; }
function getSpeed() { return parseFloat(document.getElementById('speed-sl').value) || 1; }

function splitSentences(text) {
  const raw = text.match(/[^.!?]+[.!?]+["\u201d]?\s*/g) || [text];
  const out = []; let buf = '';
  for (const s of raw) {
    if ((buf + s).length > MAX_CH) { if (buf) out.push(buf.trim()); buf = s; }
    else buf += s;
  }
  if (buf.trim()) out.push(buf.trim());
  return out.length ? out : [text.substring(0, MAX_CH)];
}

async function fetchBlob(text, voice) {
  const r = await fetch(`${SE}?voice=${encodeURIComponent(voice)}&text=${encodeURIComponent(text)}`);
  if (!r.ok) throw new Error('TTS error ' + r.status);
  return r.blob();
}

function playBlob(blob) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(blob);
    audioEl = new Audio(url);
    audioEl.playbackRate = getSpeed();
    audioEl.onended  = () => { URL.revokeObjectURL(url); audioEl = null; res(); };
    audioEl.onerror  = () => { URL.revokeObjectURL(url); audioEl = null; rej(new Error('audio error')); };
    audioEl.play().catch(rej);
  });
}

function stopAudio() {
  if (audioEl) { try { audioEl.pause(); } catch{} audioEl.src = ''; audioEl = null; }
  nextBlob = null; paraSentences = []; sentIdx = 0;
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function speakPara(idx) {
  if (!isPlaying || idx >= allParas.length) { if (isPlaying) stopSpeech(); return; }
  if (allParas[idx].isHeading) { curPara = idx + 1; return speakPara(idx + 1); }

  // Cross chapter boundary
  const ch = chapters[curChapter];
  if (idx >= ch.paraEnd && curChapter < chapters.length - 1) {
    curChapter++;
    loadChapter(curChapter);
    curPara = chapters[curChapter].paraStart;
    return speakPara(curPara);
  }

  highlight(idx); scrollTo(idx); updateProgress(); savePos();

  const voice = getVoice();
  paraSentences = splitSentences(allParas[idx].text);
  sentIdx = 0;
  nextBlob = null;

  setStatus('loading');
  try { nextBlob = await fetchBlob(paraSentences[0], voice); }
  catch { curPara = idx + 1; return speakPara(curPara); }
  setStatus('');

  while (isPlaying && sentIdx < paraSentences.length) {
    const blob = nextBlob; nextBlob = null;

    // Prefetch next sentence in background
    if (sentIdx + 1 < paraSentences.length) {
      fetchBlob(paraSentences[sentIdx + 1], voice)
        .then(b => { nextBlob = b; })
        .catch(() => {});
    }

    try { await playBlob(blob); } catch { break; }
    sentIdx++;

    // If next blob not ready, wait up to 3s
    if (sentIdx < paraSentences.length && !nextBlob) {
      setStatus('loading');
      for (let w = 0; w < 30 && !nextBlob; w++) await sleep(100);
      if (!nextBlob) {
        try { nextBlob = await fetchBlob(paraSentences[sentIdx], voice); }
        catch { break; }
      }
      setStatus('');
    }
  }

  if (isPlaying) {
    markDone(idx);
    curPara = idx + 1;
    await speakPara(curPara);
  }
}

async function startReading() {
  if (isPlaying || !allParas.length) return;
  isPlaying = true;
  document.getElementById('play-btn').textContent = '⏸';
  await speakPara(curPara);
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶';
  setStatus('');
}

function pauseReading() {
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶';
  stopAudio(); setStatus('');
}

function stopSpeech() {
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶';
  stopAudio(); setStatus('');
}

function togglePlay() {
  if (!allParas.length) return;
  isPlaying ? pauseReading() : startReading();
}

function setStatus(s) {
  document.getElementById('tts-status').textContent = s === 'loading' ? '⏳ fetching audio…' : '';
}

// Controls
document.getElementById('play-btn').onclick = togglePlay;

document.getElementById('next-btn').onclick = () => {
  const was = isPlaying; stopSpeech();
  curPara = Math.min(curPara + 1, allParas.length - 1);
  while (curPara < allParas.length - 1 && allParas[curPara].isHeading) curPara++;
  highlight(curPara); scrollTo(curPara); updateProgress();
  if (was) startReading();
};
document.getElementById('prev-btn').onclick = () => {
  const was = isPlaying; stopSpeech();
  curPara = Math.max(curPara - 1, 0);
  while (curPara > 0 && allParas[curPara].isHeading) curPara--;
  highlight(curPara); scrollTo(curPara); updateProgress();
  if (was) startReading();
};
document.getElementById('ch-next-btn').onclick = () => {
  if (curChapter < chapters.length - 1) { stopSpeech(); loadChapter(curChapter + 1); }
};
document.getElementById('ch-prev-btn').onclick = () => {
  if (curChapter > 0) { stopSpeech(); loadChapter(curChapter - 1); }
};

document.getElementById('speed-sl').oninput = function() {
  document.getElementById('speed-val').textContent =
    parseFloat(this.value).toFixed(2).replace(/\.?0+$/, '') + '×';
  if (audioEl) audioEl.playbackRate = getSpeed();
};

// Para helpers
function highlight(idx) {
  document.querySelectorAll('.para').forEach(e => e.classList.remove('reading'));
  document.querySelector(`.para[data-idx="${idx}"]`)?.classList.add('reading');
}
function markDone(idx) {
  const e = document.querySelector(`.para[data-idx="${idx}"]`);
  if (e) { e.classList.remove('reading'); e.classList.add('done'); }
}
function scrollTo(idx) {
  document.querySelector(`.para[data-idx="${idx}"]`)?.scrollIntoView({ block: 'center', behavior: 'smooth' });
}
function jumpTo(idx) {
  stopSpeech(); curPara = idx; highlight(idx); scrollTo(idx); updateProgress();
}

// Progress
function updateProgress() {
  const ch = chapters[curChapter]; if (!ch) return;
  document.getElementById('now-reading').textContent = ch.title;
  document.getElementById('prog-detail').textContent =
    `Ch ${curChapter + 1}/${chapters.length}  ·  §${curPara - ch.paraStart + 1}/${ch.paraEnd - ch.paraStart}  ·  p.${allParas[curPara]?.page || '?'}`;
  document.getElementById('prog-bar').style.width =
    (allParas.length ? (curPara / allParas.length) * 100 : 0) + '%';
}

function savePos() {
  if (bookName) localStorage.setItem('bv_' + bookName, JSON.stringify({ ch: curChapter, para: curPara }));
}

// Keyboard
document.addEventListener('keydown', e => {
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') document.getElementById('next-btn').click();
  if (e.code === 'ArrowLeft')  document.getElementById('prev-btn').click();
  if (e.code === 'ArrowUp')    document.getElementById('ch-prev-btn').click();
  if (e.code === 'ArrowDown')  document.getElementById('ch-next-btn').click();
});
</script>
</body>
</html>
